version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: beublog-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - beublog-network

  backend:
    build: ./backend
    container_name: beublog-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/beublog
      - JWT_SECRET=${JWT_SECRET:-beublog-super-secret-key-2024}
      - PORT=5000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongo
    networks:
      - beublog-network

  frontend:
    build: ./frontend
    container_name: beublog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - beublog-network

volumes:
  mongo_data:
  uploads_data:


networks:
  beublog-network:
    driver: bridge
